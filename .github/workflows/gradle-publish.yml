name: Build Mirror APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show folder structure (for debugging)
        run: find . -name "gradlew" -o -name "build.gradle" | head -20

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Find gradlew and build
        run: |
          # Find gradlew wherever it is in the repo
          GRADLEW=$(find . -name "gradlew" | head -1)
          echo "Found gradlew at: $GRADLEW"

          # Get the directory containing gradlew
          BUILD_DIR=$(dirname "$GRADLEW")
          echo "Build directory: $BUILD_DIR"

          # Make executable and build
          chmod +x "$GRADLEW"
          cd "$BUILD_DIR"
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mirror-debug
          path: "**/*.apk"
          retention-days: 7
